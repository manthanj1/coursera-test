<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Food, LLC - Module 3 Solution</title>
  
  <!-- Bootstrap 3.3.7 CSS -->
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
  <!-- Your Custom CSS -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header>
    <!-- Navbar (Not fixed, so it scrolls away) -->
    <nav id="header-nav" class="navbar navbar-default">
      <div class="container-fluid">
        <div class="navbar-header">
          <!-- Company Name / Brand -->
          <a href="index.html" class="navbar-brand">Food, LLC</a>
          
          <!-- Mobile Menu Button (Only visible on extra small screens) -->
          <button type="button" class="navbar-toggle collapsed visible-xs" data-toggle="collapse" data-target="#collapsable-nav" aria-expanded="false">
            <span class="sr-only">Toggle navigation</span>
            <span class="icon-bar"></span>
            <span class="icon-bar"></span>
            <span class="icon-bar"></span>
          </button>
        </div>
        
        <!-- Dropdown Menu (Only visible on extra small screens) -->
        <div class="collapse navbar-collapse" id="collapsable-nav">
          <ul class="nav navbar-nav visible-xs text-center">
            <li><a href="#chicken">Chicken</a></li>
            <li><a href="#beef">Beef</a></li>
            <li><a href="#sushi">Sushi</a></li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <!-- Main Content Container -->
  <div class="container">
    <!-- Centered Heading -->
    <h1 class="text-center">Our Menu</h1>
    
    <div class="row">
      <!-- Single tall section, takes up 12 columns on ALL screen sizes -->
      <div class="col-xs-12 content-section">
        <p>This is the really tall section. Scroll down to see the bottom!</p>
      </div>
    </div>
  </div>

  <!-- jQuery and Bootstrap JS for the mobile dropdown to work -->
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
</body>
</html>
